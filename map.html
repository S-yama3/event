<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>駐車場・アクセス案内 ｜ Ｎｅｗビジネスフェア</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg-color: #fdf6ff;
  --secondary: #95deea;
  --text-color: #333;
  --border-color: #333;
  --accent-pink: #ff7eb9;
  --card-bg: #ffffff;
}

body { margin: 0; font-family: 'M PLUS Rounded 1c', sans-serif; background-color: var(--bg-color); color: var(--text-color); }

/* ヘッダー */
.nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(255,255,255,0.5); backdrop-filter: blur(5px); position: sticky; top: 0; z-index: 100; }
.logo { font-size: 22px; color: var(--accent-pink); font-weight: 800; text-decoration: none; }

/* ヒーロー */
.hero { text-align: center; padding: 60px 20px; }
.hero h1 { font-size: 2rem; }
.hero h1 span { color: var(--accent-pink); border-bottom: 4px solid var(--secondary); }

/* マップセクション */
.map-section { text-align: center; margin: 60px 0; }
.map-wrapper { display: inline-block; padding: 10px; background: #fff; border: 3px solid var(--border-color); border-radius: 20px; box-shadow: 10px 10px 0px rgba(0,0,0,0.1); }
.map-wrapper img { display: block; max-width: 90vw; width: 700px; border-radius: 12px; }
.map-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }

/* カードレイアウト */
.container { max-width: 900px; margin: 0 auto; padding: 0 20px 80px; }
.card { display: flex; background: var(--card-bg); border: 3px solid var(--border-color); border-radius: 25px; box-shadow: 8px 8px 0px var(--border-color); overflow: hidden; margin-bottom: 40px; transition: transform 0.3s; }
.card:hover { transform: translateY(-5px); }

.card-video { flex: 0 0 40%; background: #000; display: flex; align-items: center; }
.card-video video { width: 100%; height: 100%; object-fit: cover; }

.card-text { flex: 1; padding: 30px; }
.card-text h3 { margin: 0 0 15px 0; color: var(--accent-pink); }

.route-list { list-style: none; padding: 0; margin: 0; }
.route-list li { display: flex; gap: 15px; margin-bottom: 12px; align-items: center; font-weight: 700; }
.num { background: var(--secondary); color: #fff; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
.highlight { color: #d63384; border-bottom: 2px solid var(--secondary); }

@media (max-width: 768px) {
  .card { flex-direction: column; }
  .card-video { height: 220px; }
  .card-text { padding: 20px; }
}
</style>
</head>
<body>

<nav class="nav-bar">
  <a href="index.html" class="logo">🅿️ 駐車場ナビ</a>
  <a href="index.html" style="font-weight:bold; color:var(--text-color); border:2px solid var(--border-color); padding:8px 20px; border-radius:50px; text-decoration:none; font-size: 14px;">TOPへ</a>
</nav>

<section class="hero">
  <h1><span>駐車場・アクセス案内</span></h1>
</section>

<section class="map-section">
  <div class="map-title">📍 会場周辺マップ</div>
  <div class="map-wrapper"><img src="images/map01010101.jpg" alt="駐車場マップ"></div>
</section>

<div class="container">
  <div class="card">
    <div class="card-video"><video src="images/01.mp4" autoplay muted playsinline loop></video></div>
    <div class="card-text">
      <h3>六丁目交差点から</h3>
      <ul class="route-list">
        <li><span class="num">1</span>仙台駅方面へ直進</li>
        <li><span class="num">2</span>一つ目の信号を<span class="highlight">右折</span></li>
        <li><span class="num">3</span>次の信号を<span class="highlight">右折</span></li>
        <li><span class="num">4</span>すぐの脇道を<span class="highlight">左折</span></li>
        <li><span class="num">5</span>50m先、右側が駐車場です</li>
      </ul>
    </div>
  </div>

  <div class="card">
    <div class="card-video"><video src="images/02.mp4" autoplay muted playsinline loop></video></div>
    <div class="card-text">
      <h3>卸町駅交差点から</h3>
      <ul class="route-list">
        <li><span class="num">1</span>東インター方面へ直進</li>
        <li><span class="num">2</span>一つ目の信号を<span class="highlight">左折</span></li>
        <li><span class="num">3</span>次の信号を<span class="highlight">右折</span></li>
        <li><span class="num">4</span>すぐの脇道を<span class="highlight">左折</span></li>
        <li><span class="num">5</span>50m先、右側が駐車場です</li>
      </ul>
    </div>
  </div>
</div>

<section class="map-section">
  <div class="map-title">🚶 駐車場から会場までの道順</div>
  <div class="map-wrapper"><img src="images/map0300.jpg" alt="駐車場から会場へのマップ"></div>
</section>

<div class="container">
  <div class="card">
    <div class="card-video"><video src="images/03.mp4" autoplay muted playsinline loop></video></div>
    <div class="card-text">
      <h3>徒歩でのアクセス</h3>
      <p>駐車場から会場入口までは徒歩で約3分です。<br>案内看板を設置しておりますので、矢印に沿ってお進みください。</p>
    </div>
  </div>
</div>

</body>
</html>
