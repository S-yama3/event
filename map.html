<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イベント会場駐車場のご案内 ｜ Ｎｅｗビジネスフェア</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght=700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg-color: #fdf6ff;
  --secondary: #95deea;
  --text-color: #4a4a4a;
  --border-color: #333;
}

body { margin: 0; font-family: 'M PLUS Rounded 1c', sans-serif; background-color: var(--bg-color); color: var(--text-color); }

.nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; }
.logo { font-size: 28px; color: #ff7eb9; text-shadow: 2px 2px 0px #fff, 4px 4px 0px var(--border-color); text-decoration: none; }
.hero { text-align: center; padding: 40px 20px; }
.hero h1 span { display: inline-block; background: var(--secondary); padding: 5px 15px; border: 4px solid var(--border-color); box-shadow: 6px 6px 0px var(--border-color); transform: rotate(-1deg); }

/* マップエリア */
.map-container { text-align: center; margin: 40px 0; padding: 20px; }
.map-container img { width: 95%; max-width: 800px; border: 4px solid var(--border-color); border-radius: 20px; box-shadow: 8px 8px 0px var(--border-color); }
.map-title { font-size: 1.5rem; margin-bottom: 20px; font-weight: bold; }

/* 動画カード（すべて左配置） */
.cards-vertical { display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 20px 20px 100px; }
.card { width: 95%; max-width: 950px; height: auto; display: flex; align-items: stretch; background: rgba(255, 255, 255, 0.9); border: 4px solid var(--border-color); border-radius: 30px; box-shadow: 12px 12px 0px var(--border-color); overflow: hidden; }
.card-text { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
.card-video { flex: 0 0 45%; background: #000; display: flex; align-items: center; }
.card-video video { width: 100%; height: 100%; object-fit: cover; }

@media (max-width: 768px) {
  .card { flex-direction: column; }
  .card-video { height: 250px; }
  .card-text { padding: 20px; }
}
</style>
</head>
<body>

<nav class="nav-bar">
  <a href="index.html" class="logo">駐車場のご案内 🚗</a>
  <a href="index.html" style="font-weight:bold; text-decoration:none; color:var(--text-color); border:3px solid var(--border-color); padding:8px 20px; border-radius:50px; background:#fff; font-size: 14px;">Topへ戻る</a>
</nav>

<section class="hero">
  <h1>イベント会場<span>駐車場・アクセス案内</span></h1>
</section>

<section class="map-container">
  <img src="images/map.jpg" alt="会場駐車場マップ">
</section>

<section class="cards-vertical">

  <div class="card">
    <div class="card-video"><video src="images/01.mp4" autoplay muted playsinline loop></video></div>
    <div class="card-text">
      <h3>東からの道順</h3>
      <p>（ここに東からの説明文を入力）</p>
    </div>
  </div>

  <div class="card">
    <div class="card-video"><video src="images/02.mp4" autoplay muted playsinline loop></video></div>
    <div class="card-text">
      <h3>西からの道順</h3>
      <p>（ここに西からの説明文を入力）</p>
    </div>
  </div>

</section>

<section class="map-container">
  <div class="map-title">駐車場から会場までの道順</div>
  <img src="images/map2.jpg" alt="駐車場から会場までのマップ">
</section>

<section class="cards-vertical" style="padding-top: 0;">
  <div class="card">
    <div class="card-video"><video src="images/03.mp4" autoplay muted playsinline loop></video></div>
    <div class="card-text">
      <h3>駐車場から会場へ</h3>
      <p>（ここに駐車場からの道順説明文を入力）</p>
    </div>
  </div>
</section>

</body>
</html>
