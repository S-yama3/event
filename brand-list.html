<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出展社一覧 ｜ Ｎｅｗビジネスフェア</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght=700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-color: #fdf6ff;
  --primary: #ffadd2;
  --accent: #fff3bf;
  --green: #c2f0af;
  --text-color: #4a4a4a;
  --border-color: #333;
}
body { margin: 0; font-family: 'M PLUS Rounded 1c', sans-serif; background-color: var(--bg-color); color: var(--text-color); }

/* --- ヘッダー --- */
nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; }
.logo { font-size: 28px; color: #ff7eb9; text-shadow: 2px 2px 0px #fff, 4px 4px 0px var(--border-color); text-decoration: none; }

/* --- メインコンテンツ枠 --- */
.container { border: 4px solid var(--border-color); border-radius: 30px; padding: 30px; margin: 0 auto 50px; max-width: 950px; box-shadow: 8px 8px 0px var(--border-color); background-color: #fff; }

/* --- 3列グリッドとカード --- */
.maker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
.maker-card {
  display: flex; align-items: center; justify-content: center;
  padding: 12px 10px; background: #fdf6ff; border: 3px solid var(--border-color); border-radius: 12px;
  text-decoration: none; color: var(--text-color); font-weight: bold;
  text-align: center; font-size: 14px; box-shadow: 4px 4px 0px var(--border-color);
  transition: transform 0.2s, box-shadow 0.2s; word-break: keep-all;
}
.maker-card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--border-color); background-color: var(--accent); }

/* --- 枠外告知カード --- */
.more-announcement {
  display: inline-block; padding: 20px 40px; background: white;
  border: 4px dashed var(--border-color); border-radius: 50px;
  text-decoration: none; color: #ff7eb9; font-weight: 800; font-size: 18px;
  box-shadow: 6px 6px 0px var(--border-color); transition: all 0.3s ease;
}
.more-announcement:hover { background: var(--primary); color: white; transform: scale(1.05); border-style: solid; }

/* --- フッターボタン --- */
.btn-area { text-align: center; margin-bottom: 100px; }
.back-btn { display: inline-block; font-weight: bold; text-decoration: none; color: var(--text-color); border: 4px solid var(--border-color); padding: 15px 40px; border-radius: 50px; background: var(--green); font-size: 18px; box-shadow: 6px 6px 0px var(--border-color); transition: transform 0.2s, box-shadow 0.2s; }
.back-btn:hover { transform: translate(-4px, -4px); box-shadow: 10px 10px 0px var(--border-color); }

@media (max-width: 768px) { .maker-grid { grid-template-columns: repeat(2, 1fr); } nav { padding: 20px; } }
@media (max-width: 480px) { .maker-grid { grid-template-columns: 1fr; } }
</style>
</head>
