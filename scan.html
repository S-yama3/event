<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商談メモ登録システム</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; max-width: 450px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h3 { color: #333; }
        #interactive { width: 100%; border: 2px solid #ddd; border-radius: 8px; margin: 15px 0; overflow: hidden; }
        #interactive video { width: 100%; }
        .info-box { text-align: left; margin: 15px 0; padding: 10px; background: #f9f9f9; border-radius: 8px; }
        .label { font-size: 0.8rem; color: #777; margin-bottom: 2px; }
        .value { font-size: 1.1rem; font-weight: bold; margin-bottom: 8px; }
        textarea, input { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; color: white; }
        .btn-reg { background: #28a745; }
        .btn-reset { background: #6c757d; }
    </style>
</head>
<body>

<div class="card">
    <div id="camera-section">
        <h3>来場者バーコードを読み取り</h3>
        <div id="interactive"></div>
    </div>

    <div id="result-section" style="display:none;">
        <h3>読み取り完了</h3>
        <div class="info-box">
            <div class="label">氏名</div>
            <div class="value" id="res-name">-</div>
            <div class="label">会社名</div>
            <div class="value" id="res-company">-</div>
        </div>
        <textarea id="memo" rows="4" placeholder="商談メモを入力"></textarea>
        <input type="text" id="exhibitor" placeholder="出店社名（対応者）">
        <button class="btn-reg" onclick="saveMemo()">メモを登録する</button>
        <button class="btn-reset" onclick="location.reload()">再スキャン</button>
    </div>
</div>

<script>
    // 新しいGASのURL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwNYDPtMJq1e_Nr37RkHaPJLStq8oEFjAD3OjT1lv5BkgE35aZJpkCYKmPXl7KXSYMj/exec";
    let currentId = "";

    // カメラ起動設定
    Quagga.init({
        inputStream: { type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
        decoder: { readers: ["ean_reader"] }
    }, (err) => { if (!err) Quagga.start(); });

    // バーコード読み取り成功時
    Quagga.onDetected((res) => {
        const code = res.codeResult.code;
        if (/^\d{13}$/.test(code)) { // 13桁のIDのみ
            Quagga.stop();
            currentId = code;
            fetch(`${GAS_URL}?qr=${code}`)
            .then(r => r.json())
            .then(data => {
                if(data.found) {
                    document.getElementById('res-name').innerText = data.name + ' 様';
                    document.getElementById('res-company').innerText = data.company;
                    document.getElementById('camera-section').style.display = 'none';
                    document.getElementById('result-section').style.display = 'block';
                } else {
                    alert('登録番号: ' + code + ' は見つかりません。');
                    Quagga.start();
                }
            });
        }
    });

    // 登録ボタン処理
function saveMemo() {
        const memo = document.getElementById('memo').value;
        const exhibitor = document.getElementById('exhibitor').value;
        
        // --- ここでバリデーションを追加 ---
        if (memo.trim() !== "" && exhibitor.trim() === "") {
            alert('メモを入力した場合は、出店社名も必ず入力してください。');
            return; // 登録処理を中断
        }
        // --------------------------------
        
        // メモも出店社名も空の場合は登録しない（必要であれば外してください）
        if (memo.trim() === "" && exhibitor.trim() === "") {
            alert('メモまたは出店社名を入力してください。');
            return;
        }

        fetch(`${GAS_URL}?action=saveMemo&qr=${currentId}&memo=${encodeURIComponent(memo)}&exhibitor=${encodeURIComponent(exhibitor)}`)
        .then(r => r.json())
        .then(d => {
            if(d.success) {
                alert('登録しました！');
                location.reload();
            } else {
                alert('登録に失敗しました');
            }
        });
    }
</script>
</body>
</html>
